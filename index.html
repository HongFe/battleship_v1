<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: blob:; connect-src 'self' ws: wss:; worker-src 'self' blob:;" />
  <title>⚓ Black Tide — A Pirate's Voyage</title>

  <!-- PWA manifest -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#D4A847">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚓</text></svg>">

  <!-- Pirate-noir typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Pirata+One&family=Cinzel:wght@400;600;800&family=Black+Han+Sans&family=Noto+Serif+KR:wght@400;700;900&display=swap"
    rel="stylesheet"
  >

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #050B14;
      font-family: 'Noto Serif KR', serif;
    }
    canvas { display: block; touch-action: none; }
    /* Mobile safe area — prevent browser chrome from covering UI */
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      body { padding-bottom: env(safe-area-inset-bottom); }
    }
    /* Loading splash before Phaser starts */
    #boot-splash {
      position: fixed; inset: 0;
      background: #050B14;
      color: #D4A847;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Pirata One', serif;
      font-size: 28px;
      letter-spacing: 4px;
      z-index: 1000;
      transition: opacity 0.6s ease-out;
    }
    #boot-splash.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="boot-splash">⚓ HOIST THE COLOURS ⚓</div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
